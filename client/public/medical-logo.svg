<!-- client/public/medical-logo.svg -->
<!-- Custom medical logo for Curalink -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <defs>
        <linearGradient id="medicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="crossGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background circle -->
    <circle cx="100" cy="100" r="95" fill="url(#medicalGradient)" opacity="0.9" />
    <circle cx="100" cy="100" r="85" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3" />
    
    <!-- Medical cross -->
    <g transform="translate(100, 100)">
        <!-- Vertical bar -->
        <rect x="-15" y="-40" width="30" height="80" rx="8" fill="url(#crossGradient)" />
        <!-- Horizontal bar -->
        <rect x="-40" y="-15" width="80" height="30" rx="8" fill="url(#crossGradient)" />
    </g>
    
    <!-- DNA helix decoration -->
    <g opacity="0.15">
        <path d="M30,50 Q50,30 70,50 T110,50 T150,50" stroke="#ffffff" stroke-width="3" fill="none" />
        <path d="M30,150 Q50,170 70,150 T110,150 T150,150" stroke="#ffffff" stroke-width="3" fill="none" />
        <line x1="50" y1="40" x2="50" y2="160" stroke="#ffffff" stroke-width="2" />
        <line x1="90" y1="40" x2="90" y2="160" stroke="#ffffff" stroke-width="2" />
        <line x1="130" y1="40" x2="130" y2="160" stroke="#ffffff" stroke-width="2" />
    </g>
    
    <!-- Outer ring text -->
    <path id="textPath" d="M35,100 A65,65 0 1,1 165,100 A65,65 0 1,1 35,100" fill="none" />
    <text font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold" letter-spacing="3">
        <textPath href="#textPath" startOffset="10%">
            CURALINK • AI MEDICAL RESEARCH
        </textPath>
    </text>
</svg>
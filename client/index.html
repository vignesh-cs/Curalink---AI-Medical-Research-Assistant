<!-- client/index.html -->
<!-- Updated HTML entry point with proper favicon references -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/medical-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Curalink - AI Medical Research Assistant for evidence-based healthcare information" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="keywords" content="medical research, AI assistant, clinical trials, healthcare, PubMed, research publications" />
    <meta name="author" content="Curalink" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Curalink - AI Medical Research Assistant" />
    <meta property="og:description" content="Get evidence-based medical research insights powered by AI" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/medical-logo.svg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>Curalink - AI Medical Research Assistant</title>
</head>
<body>
    <div id="root"></div>
    
    <!-- Loading indicator that shows before React loads -->
    <div id="initial-loading" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; background: #f8fafc;">
        <div style="text-align: center;">
            <img src="/medical-logo.svg" alt="Curalink" style="width: 80px; height: 80px; margin-bottom: 20px;" />
            <h2 style="color: #1e293b; margin-bottom: 10px;">Curalink</h2>
            <p style="color: #64748b;">Loading AI Medical Assistant...</p>
        </div>
    </div>
    
    <script type="module" src="/src/index.jsx"></script>
    
    <!-- Remove loading indicator after React mounts -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('initial-loading');
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.transition = 'opacity 0.3s ease';
                    setTimeout(function() {
                        if (loader.parentNode) {
                            loader.parentNode.removeChild(loader);
                        }
                    }, 300);
                }
            }, 500);
        });
    </script>
</body>
</html>
